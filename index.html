<!DOCTYPE html>
<html lang="zh-CN" data-lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>电视广播 - Electron</title>
    <!-- TailwindCSS CDN（Electron 本地加载没问题） -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HLS 预览支持 -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              slateBg: '#020617',
            },
          },
        },
      };
    </script>
  </head>
  <body class="h-screen bg-slate-950 text-slate-100 antialiased overflow-hidden">
    <div class="h-full max-w-5xl mx-auto px-6 py-6 space-y-4 flex flex-col">
      <header class="flex items-center justify-between">
        <div>
          <h1 class="text-2xl font-semibold tracking-tight text-slate-50">
            TV Broadcast 桌面版
          </h1>
          <p class="text-sm text-slate-400 mt-1">
            选择 DLNA 设备和频道，一键投屏到电视
          </p>
        </div>
        <div class="flex items-center gap-2">
          <div class="flex items-center gap-1.5 bg-slate-900/60 rounded-full p-1 border border-slate-700">
            <div class="relative">
              <select
                id="deviceSelect"
                class="h-7 appearance-none bg-slate-800/50 rounded-full pl-3 pr-8 text-xs text-slate-100 outline-none ring-0 border border-slate-700/50 hover:border-slate-600 focus:border-sky-500 transition cursor-pointer min-w-[140px]"
              ></select>
              <div class="absolute right-2 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
              </div>
            </div>
            <button
              id="refreshDeviceButton"
              class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-slate-800 text-slate-300 hover:bg-slate-700 hover:text-slate-100 active:scale-95 transition"
              title="刷新设备"
            >
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
              </svg>
            </button>
          </div>
          <button
            id="refreshChannelButton"
            class="inline-flex h-9 px-3 items-center justify-center gap-1.5 rounded-full border border-slate-700 bg-slate-900/60 text-xs text-slate-300 hover:bg-slate-800 hover:text-slate-100 hover:border-slate-600 active:scale-95 transition"
            title="刷新频道"
          >
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            <span>刷新</span>
          </button>
          <button
            id="castButton"
            class="inline-flex h-9 px-4 items-center justify-center gap-1.5 rounded-full bg-sky-600 text-xs font-semibold text-white hover:bg-sky-500 active:scale-95 transition shadow-lg shadow-sky-500/20"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>投屏</span>
          </button>
        </div>
      </header>

      <main class="flex-1 grid grid-cols-1 md:grid-cols-3 gap-4 items-start min-h-0">
        <!-- 左侧：预览 + 实时统计 -->
        <div class="md:col-span-2 space-y-4 h-full flex flex-col">
          <!-- 频道预览 -->
          <section
            class="flex-1 rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 space-y-3 shadow-lg shadow-black/30 flex flex-col min-h-0"
          >
            <div class="flex items-center justify-between">
              <h3 class="text-sm font-medium text-slate-50">频道预览</h3>
              <span class="text-[11px] text-slate-500">HLS 实时统计</span>
            </div>
            <div
              class="relative mt-1 rounded-xl overflow-hidden border border-slate-800 bg-black flex-1 min-h-0"
            >
              <video
                id="previewVideo"
                class="w-full h-full object-contain bg-black"
                controls
                playsinline
              ></video>
            </div>

            <!-- 实时统计信息 -->
            <div class="grid grid-cols-4 gap-2 text-xs">
              <div class="bg-slate-800/50 rounded-lg px-2 py-1.5 text-center">
                <div class="text-[10px] text-slate-500">延迟</div>
                <div id="statLatency" class="text-emerald-400 font-medium">-</div>
              </div>
              <div class="bg-slate-800/50 rounded-lg px-2 py-1.5 text-center">
                <div class="text-[10px] text-slate-500">码率</div>
                <div id="statBitrate" class="text-sky-400 font-medium">-</div>
              </div>
              <div class="bg-slate-800/50 rounded-lg px-2 py-1.5 text-center">
                <div class="text-[10px] text-slate-500">分辨率</div>
                <div id="statResolution" class="text-amber-400 font-medium">-</div>
              </div>
              <div class="bg-slate-800/50 rounded-lg px-2 py-1.5 text-center">
                <div class="text-[10px] text-slate-500">下载</div>
                <div id="statDownload" class="text-purple-400 font-medium">-</div>
              </div>
            </div>
          </section>

          <!-- 状态 + 测速 -->
          <section
            class="rounded-2xl border border-slate-800 bg-slate-900/80 px-4 py-3 space-y-3 shadow-lg shadow-black/30"
          >
            <div
              id="statusBar"
              class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs text-slate-300"
            >
              <div class="space-y-1">
                <div
                  class="text-[11px] uppercase tracking-wide text-slate-500"
                >
                  状态
                </div>
                <span id="statusText">初始化中...</span>
              </div>

              <div class="space-y-1">
                <div class="flex items-center justify-between">
                  <span
                    class="text-[11px] uppercase tracking-wide text-slate-500"
                  >
                    连接延迟
                  </span>
                  <button
                    id="speedButton"
                    class="inline-flex items-center gap-1 rounded-full border border-slate-700 px-3 py-1 text-[11px] text-slate-300 hover:bg-slate-800/90 transition"
                  >
                    ⏱ 测速
                  </button>
                </div>
                <div id="speedText" class="text-[11px] text-slate-400">
                  未测速
                </div>
              </div>
            </div>
          </section>
        </div>

        <!-- 右侧：频道列表 Gallery + m3u8 配置 -->
        <section
          class="rounded-2xl border border-slate-800 bg-slate-900/80 shadow-xl shadow-black/40 p-5 space-y-3 h-full flex flex-col min-h-0"
        >
          <div class="flex items-center justify-between mb-2">
            <div class="flex flex-col">
              <h2 class="text-base font-medium text-slate-50">频道列表</h2>
              <span class="text-[11px] text-slate-500">M3U 源</span>
            </div>
          </div>

          <!-- m3u8 源管理 -->
          <div class="space-y-2 mb-2">
            <div class="flex items-center justify-between">
              <label class="block text-[11px] font-medium text-slate-400"
                >信号源</label
              >
              <button
                id="manageSourceButton"
                class="text-[11px] text-sky-400 hover:text-sky-300 transition"
              >
                管理
              </button>
            </div>
            <div class="relative">
              <select
                id="sourceSelect"
                class="w-full appearance-none rounded-full border border-slate-700 bg-slate-900/70 pl-3 pr-10 py-1.5 text-xs text-slate-100 outline-none ring-0 hover:border-slate-600 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/40 transition cursor-pointer"
              ></select>
              <div class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
              </div>
            </div>
          </div>

          <!-- 频道搜索框 -->
          <div class="mb-2">
            <input
              id="channelSearch"
              type="text"
              class="w-full rounded-full border border-slate-700 bg-slate-900/70 px-3 py-1.5 text-xs text-slate-100 outline-none ring-0 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/40 transition"
              placeholder="搜索频道..."
            />
          </div>

          <div class="flex items-center justify-between mb-1">
            <p class="text-[11px] text-slate-500">
              点击卡片预览频道，可按速度排序
            </p>
            <button
              id="sortBySpeedButton"
              class="text-[11px] text-sky-400 hover:text-sky-300 transition"
            >
              速度排序 ↓
            </button>
          </div>
          <div
            id="channelGallery"
            class="grid grid-cols-2 gap-2 flex-1 overflow-y-auto pr-1 min-h-0"
          ></div>
        </section>
      </main>
    </div>

    <!-- 源管理弹窗 -->
    <div
      id="sourceModal"
      class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50"
    >
      <div
        class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-md mx-4 shadow-2xl"
      >
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-medium text-slate-50">管理信号源</h3>
          <button
            id="closeSourceModal"
            class="text-slate-400 hover:text-slate-200 transition"
          >
            ✕
          </button>
        </div>

        <!-- 源列表 -->
        <div
          id="sourceList"
          class="space-y-2 max-h-48 overflow-y-auto mb-4 pr-1"
        ></div>

        <!-- 添加新源 -->
        <div class="border-t border-slate-800 pt-4 space-y-3">
          <h4 class="text-sm font-medium text-slate-300">添加信号源</h4>
          <input
            id="newSourceName"
            type="text"
            class="w-full rounded-lg border border-slate-700 bg-slate-800/70 px-3 py-2 text-xs text-slate-100 outline-none focus:border-sky-500 transition"
            placeholder="名称"
          />
          <input
            id="newSourceUrl"
            type="text"
            class="w-full rounded-lg border border-slate-700 bg-slate-800/70 px-3 py-2 text-xs text-slate-100 outline-none focus:border-sky-500 transition"
            placeholder="M3U8 地址"
          />
          <button
            id="addSourceButton"
            class="w-full rounded-lg bg-sky-600 hover:bg-sky-500 text-white text-xs font-medium py-2 transition"
          >
            添加
          </button>
        </div>
      </div>
    </div>

    <script src="./renderer.js"></script>
  </body>
  </html>
